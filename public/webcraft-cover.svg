<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&amp;display=swap');
    .title { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 80px; fill: #FFFFFF; }
    .subtitle { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 26px; fill: #94A3B8; }
    .gradient-text { fill: url(#text_gradient); }
  </style>

  <!-- Deep dark background -->
  <rect width="1200" height="400" fill="#030712"/>
  
  <!-- Subtle Dot Grid Background -->
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#FFFFFF" opacity="0.05" />
    </pattern>
  </defs>
  <rect width="1200" height="400" fill="url(#dotGrid)" />

  <!-- Definitions for Blur and Gradients -->
  <defs>
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="80" result="blur" />
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="120" result="blur" />
    </filter>

    <linearGradient id="text_gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    
    <linearGradient id="icon_bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    
    <linearGradient id="icon_border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop stop-color="#818CF8"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <!-- Glowing Orbs inside background -->
  <circle cx="150" cy="100" r="150" fill="#4F46E5" filter="url(#glow1)" opacity="0.3" />
  <circle cx="1050" cy="300" r="200" fill="#0EA5E9" filter="url(#glow2)" opacity="0.25" />

  <!-- Logo Group -->
  <g transform="translate(560, 60)">
    <!-- Base Canvas box -->
    <rect x="-64" y="0" width="128" height="110" rx="16" fill="url(#icon_bg)" stroke="url(#icon_border)" stroke-width="2"/>
    
    <!-- Top toolbar simulator -->
    <rect x="-44" y="18" width="88" height="8" rx="4" fill="#334155" />
    <circle cx="-40" cy="22" r="2" fill="#4F46E5" />
    <circle cx="-30" cy="22" r="2" fill="#0EA5E9" />
    
    <!-- Left panel component -->
    <rect x="-44" y="38" width="30" height="50" rx="6" fill="#818CF8" />
    
    <!-- Main content component -->
    <rect x="-4" y="38" width="48" height="28" rx="6" fill="#38BDF8" />
    <rect x="-4" y="74" width="48" height="14" rx="4" fill="#475569" opacity="0.7"/>
  </g>

  <!-- Text elements -->
  <text x="600" y="260" text-anchor="middle" class="title">Web<tspan class="gradient-text">Craft</tspan></text>
  <text x="600" y="315" text-anchor="middle" class="subtitle">The Visual Builder for React</text>
  <text x="600" y="360" text-anchor="middle" style="font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; fill: #475569; letter-spacing: 6px;">DESIGN • BUILD • EXPORT</text>
</svg>
